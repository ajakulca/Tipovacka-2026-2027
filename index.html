<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIPOVAČKA — Ligová tipovací soutěž</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --ink:#050505;
    --panel:#0f1210;
    --line:#23271f;
    --amber:#ffc600;
    --cyan:#29e3ff;
    --grass:#33ff77;
    --alert:#ff4136;
    --chalk:#e9e9e4;
    --dim:#5a5f57;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--chalk);}
  body{
    font-family:'IBM Plex Mono',monospace;
    font-size:15px;
    line-height:1.5;
    min-height:100vh;
    position:relative;
  }
  body::before{
    content:"";
    position:fixed;inset:0;
    background:repeating-linear-gradient(180deg,rgba(255,255,255,0.025) 0px,rgba(255,255,255,0.025) 1px,transparent 1px,transparent 3px);
    pointer-events:none;
    z-index:999;
  }
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

  .screen{max-width:880px;margin:0 auto;padding:0 0 84px;}

  header.banner{
    background:var(--amber);
    color:#050505;
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    font-family:'Space Mono',monospace;
    font-weight:700;
    letter-spacing:0.5px;
  }
  header.banner .title{font-size:15px; text-transform:uppercase;}
  header.banner .pageno{font-size:13px; opacity:0.75;}

  .subbar{
    display:flex;justify-content:space-between;align-items:center;
    padding:8px 16px;border-bottom:1px solid var(--line);
    font-size:12px;color:var(--dim);
  }
  .subbar button{
    background:none;border:1px solid var(--line);color:var(--cyan);
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    padding:4px 10px;cursor:pointer;border-radius:2px;
  }
  .subbar button:hover{border-color:var(--cyan);}
  .subbar button:focus-visible, a:focus-visible, .fx button:focus-visible{outline:2px solid var(--cyan); outline-offset:2px;}

  main{padding:18px 16px 8px;}

  .blink{animation:blink 1.1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  h2.section-title{
    font-family:'Space Mono',monospace;
    color:var(--amber);
    text-transform:uppercase;
    font-size:15px;
    letter-spacing:1px;
    margin:0 0 12px;
    padding-bottom:6px;
    border-bottom:2px solid var(--amber);
  }

  .grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--line);}
  table{border-collapse:collapse;width:100%;min-width:420px;}
  th,td{padding:7px 10px;text-align:left;white-space:nowrap;font-size:14px;}
  thead th{
    background:var(--panel);
    color:var(--cyan);
    font-family:'Space Mono',monospace;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    border-bottom:1px solid var(--line);
    position:sticky;top:0;
  }
  tbody tr{border-bottom:1px solid var(--line);}
  tbody tr:nth-child(even){background:rgba(255,255,255,0.02);}
  td.rank{color:var(--amber);font-family:'Space Mono',monospace;font-weight:700;width:36px;}
  td.pts{color:var(--grass);font-weight:600;font-family:'Space Mono',monospace;}
  .top3 td.rank{font-size:16px;}

  .cards{display:flex;flex-direction:column;gap:14px;margin-top:6px;}
  .home-card{border:1px solid var(--line);padding:12px 14px;background:var(--panel);}
  .home-card h3{
    margin:0 0 8px;font-family:'Space Mono',monospace;color:var(--cyan);
    font-size:12px;text-transform:uppercase;letter-spacing:0.5px;
  }
  .mini-row{display:flex;justify-content:space-between;padding:3px 0;font-size:14px;border-bottom:1px dashed var(--line);}
  .mini-row:last-child{border-bottom:none;}
  .mini-row .name{color:var(--chalk);}
  .mini-row .val{color:var(--grass);font-family:'Space Mono',monospace;}

  .round-picker{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .round-picker button{
    background:var(--panel);border:1px solid var(--line);color:var(--chalk);
    font-family:'Space Mono',monospace;font-size:12px;padding:6px 9px;cursor:pointer;
  }
  .round-picker button.active{background:var(--amber);color:#050505;border-color:var(--amber);font-weight:700;}
  .round-picker button:hover{border-color:var(--cyan);}

  .match-card{border:1px solid var(--line);margin-bottom:10px;padding:10px 12px;}
  .match-head{display:flex;justify-content:space-between;align-items:baseline;font-size:14px;margin-bottom:8px;}
  .match-head .fixture{color:var(--chalk);}
  .match-head .result{font-family:'Space Mono',monospace;color:var(--amber);font-weight:700;font-size:15px;}
  .match-head .result.pending{color:var(--dim);font-weight:400;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    font-family:'Space Mono',monospace;font-size:12px;
    border:1px solid var(--line);padding:3px 7px;
    display:flex;gap:6px;
  }
  .chip .who{color:var(--dim);}
  .chip.exact{color:var(--grass);border-color:var(--grass);}
  .chip.direction{color:var(--amber);border-color:var(--amber);}
  .chip.miss{color:var(--alert);border-color:var(--alert);}
  .chip.pending{color:var(--dim);}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin:10px 0 4px;}
  .legend span{display:inline-flex;align-items:center;gap:4px;}
  .legend i{width:9px;height:9px;display:inline-block;}
  .legend .l-exact{background:var(--grass);}
  .legend .l-dir{background:var(--amber);}
  .legend .l-miss{background:var(--alert);}

  .fx{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;z-index:1000;
    font-family:'Space Mono',monospace;
    font-weight:700;font-size:12px;text-transform:uppercase;
  }
  .fx button{
    flex:1;border:none;padding:13px 4px;cursor:pointer;letter-spacing:0.5px;
    color:#050505;opacity:0.88;
  }
  .fx button.active{opacity:1;box-shadow:inset 0 3px 0 rgba(0,0,0,0.35);}
  .fx button[data-p="domu"]{background:var(--alert);}
  .fx button[data-p="jednotlivci"]{background:var(--grass);}
  .fx button[data-p="tymy"]{background:var(--amber);}
  .fx button[data-p="zapasy"]{background:var(--cyan);}

  .state-msg{padding:40px 16px;text-align:center;color:var(--dim);font-size:14px;}
  .state-msg a{color:var(--cyan);}

  .hidden{display:none;}
</style>
</head>
<body>
<div class="screen">
  <header class="banner">
    <span class="title">Tipovačka — Liga</span>
    <span class="pageno" id="pageno">P100</span>
  </header>
  <div class="subbar">
    <span id="updated">Načítám data…</span>
    <button id="refreshBtn">Obnovit</button>
  </div>

  <main id="app">
    <div class="state-msg" id="loading">NAČÍTÁM DATA<span class="blink">_</span></div>
  </main>
</div>

<nav class="fx">
  <button data-p="domu" class="active">Domů</button>
  <button data-p="jednotlivci">Jednotlivci</button>
  <button data-p="tymy">Týmy</button>
  <button data-p="zapasy">Zápasy</button>
</nav>

<script>
// ====== CONFIG ======
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRg_TzppNqjN3N9bfhMZ1mbVAqNqvHod2_h37lXPr2e7HJsU-aKrUtzvsKqbOO0EFniJJdz6os6HCxV/pub?output=csv";
const AUTO_REFRESH_MS = 5 * 60 * 1000; // 5 min

const STAT_LABELS = {
  b102: "Body 1,0,2",
  bpresne: "Body přesné výsledky",
  bbonus: "Body bonus",
  celkemJedn: "Celkem jednotlivci",
  tymVKole: "Tým v tomto kole",
  celkemTym: "Celkem tým",
  poradiTym: "Pořadí týmů"
};

let DATA = null;

function norm(s){ return (s || "").toString().trim(); }

function parseScore(s){
  s = norm(s);
  const m = s.match(/^(\d+)\s*:\s*(\d+)$/);
  if(!m) return null;
  return [parseInt(m[1],10), parseInt(m[2],10)];
}
function outcome(pair){
  if(!pair) return null;
  const d = pair[0]-pair[1];
  return d>0?1:(d<0?-1:0);
}

function parseSheet(rows){
  // find header row (contains "Zápas")
  let headerIdx = -1;
  for(let r=0;r<rows.length;r++){
    if(rows[r].some(c => norm(c)==="Zápas")){ headerIdx = r; break; }
  }
  if(headerIdx < 1) throw new Error("Nenašel jsem hlavičku 'Zápas' v datech.");
  const headerRow = rows[headerIdx];
  const namesRow = rows[headerIdx-1];

  const labelCol = headerRow.findIndex(c => norm(c)==="Zápas");
  let resultCol = -1;
  for(let i=headerRow.length-1;i>=0;i--){ if(norm(headerRow[i])==="Zápas"){ resultCol = i; break; } }
  const playerCols = [];
  for(let i=labelCol+1;i<resultCol;i++){
    if(norm(headerRow[i]).toUpperCase()==="TIP") playerCols.push(i);
  }
  if(playerCols.length===0 || resultCol<0) throw new Error("Nepodařilo se rozpoznat sloupce s tipy.");

  // build teams (pairs of consecutive player columns)
  const teams = [];
  for(let i=0;i<playerCols.length;i+=2){
    const c1 = playerCols[i], c2 = playerCols[i+1];
    const n1 = norm(namesRow[c1]) || `Hráč ${c1}`;
    const n2 = norm(namesRow[c2]) || `Hráč ${c2}`;
    teams.push({ id: teams.length, cols:[c1,c2], names:[n1,n2], label:`${n1} & ${n2}` });
  }

  const players = playerCols.map(c => ({ col:c, name: norm(namesRow[c]) || `Hráč ${c}` }));

  const rounds = [];
  let cur = null;

  function ensureRound(){
    if(!cur){ cur = { number: rounds.length+1, matches: [], stats:{} }; }
    return cur;
  }
  function getCell(row, col){ return norm(row[col]); }
  function pairVal(row, c1, c2){
    const a = getCell(row,c1), b = getCell(row,c2);
    return a !== "" ? a : b;
  }

  for(let r=headerIdx+1; r<rows.length; r++){
    const row = rows[r];
    if(!row || row.length===0) continue;
    const label = getCell(row, labelCol);
    if(label === "") continue;
    if(label === "Zápas") continue;

    if(label.includes(" - ")){
      const rd = ensureRound();
      const tips = {};
      playerCols.forEach(c => tips[c] = getCell(row,c));
      rd.matches.push({ fixture: label, tips, result: getCell(row, resultCol) });
      continue;
    }

    const known = Object.values(STAT_LABELS).find(v => v === label);
    if(known){
      const rd = ensureRound();
      const perPlayer = {};
      playerCols.forEach(c => perPlayer[c] = getCell(row,c));
      const perTeam = {};
      teams.forEach(t => perTeam[t.id] = pairVal(row, t.cols[0], t.cols[1]));
      rd.stats[label] = { perPlayer, perTeam };

      if(label === STAT_LABELS.poradiTym){
        rounds.push(rd);
        cur = null;
      }
    }
  }
  if(cur && cur.matches.length){ rounds.push(cur); }

  return { players, teams, rounds };
}

function computeStandings(data){
  const { players, teams, rounds } = data;

  const indivTotals = {};
  players.forEach(p => indivTotals[p.col] = 0);
  const teamTotals = {};
  teams.forEach(t => teamTotals[t.id] = 0);

  rounds.forEach(rd => {
    const ij = rd.stats[STAT_LABELS.celkemJedn];
    if(ij) players.forEach(p => { indivTotals[p.col] += parseInt(ij.perPlayer[p.col]||"0",10) || 0; });
    const tk = rd.stats[STAT_LABELS.tymVKole];
    if(tk) teams.forEach(t => { teamTotals[t.id] += parseInt(tk.perTeam[t.id]||"0",10) || 0; });
  });

  const indivRanked = players.map(p => ({ name:p.name, pts: indivTotals[p.col] }))
    .sort((a,b) => b.pts - a.pts);
  let rank=1;
  indivRanked.forEach((r,i) => { if(i>0 && r.pts < indivRanked[i-1].pts) rank = i+1; r.rank = rank; });

  const teamRanked = teams.map(t => ({ label:t.label, pts: teamTotals[t.id] }))
    .sort((a,b) => b.pts - a.pts);
  rank=1;
  teamRanked.forEach((r,i) => { if(i>0 && r.pts < teamRanked[i-1].pts) rank = i+1; r.rank = rank; });

  return { indivRanked, teamRanked };
}

function renderHome(data, standings){
  const nextRound = data.rounds.find(rd => rd.matches.some(m => m.result === ""));
  let html = '<h2 class="section-title">Domů</h2><div class="cards">';

  html += '<div class="home-card"><h3>Top 3 — Jednotlivci</h3>';
  standings.indivRanked.slice(0,3).forEach(p => {
    html += `<div class="mini-row"><span class="name">${p.rank}. ${p.name}</span><span class="val">${p.pts} b.</span></div>`;
  });
  html += '</div>';

  html += '<div class="home-card"><h3>Top 3 — Týmy</h3>';
  standings.teamRanked.slice(0,3).forEach(t => {
    html += `<div class="mini-row"><span class="name">${t.rank}. ${t.label}</span><span class="val">${t.pts} b.</span></div>`;
  });
  html += '</div>';

  if(nextRound){
    html += `<div class="home-card"><h3>Nejbližší nerozehrané kolo — Kolo ${nextRound.number}</h3>`;
    nextRound.matches.forEach(m => {
      html += `<div class="mini-row"><span class="name">${m.fixture}</span><span class="val">${m.result || '–'}</span></div>`;
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function renderIndiv(standings){
  let html = '<h2 class="section-title">Pořadí jednotlivců</h2><div class="grid-scroll"><table><thead><tr><th>#</th><th>Jméno</th><th>Body</th></tr></thead><tbody>';
  standings.indivRanked.forEach(p => {
    html += `<tr><td class="rank">${p.rank}</td><td>${p.name}</td><td class="pts">${p.pts}</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function renderTeams(standings){
  let html = '<h2 class="section-title">Pořadí týmů</h2><div class="grid-scroll"><table><thead><tr><th>#</th><th>Tým</th><th>Body</th></tr></thead><tbody>';
  standings.teamRanked.forEach(t => {
    html += `<tr><td class="rank">${t.rank}</td><td>${t.label}</td><td class="pts">${t.pts}</td></tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

function shortName(n){ return n.length>4 ? n.slice(0,4) : n; }

function renderMatches(data, roundNumber){
  const rounds = data.rounds;
  const rd = rounds.find(r => r.number === roundNumber) || rounds[0];
  let html = '<h2 class="section-title">Zápasy a tipy</h2>';
  html += '<div class="round-picker">';
  rounds.forEach(r => {
    html += `<button data-round="${r.number}" class="${r.number===rd.number?'active':''}">Kolo ${r.number}</button>`;
  });
  html += '</div>';

  html += '<div class="legend"><span><i class="l-exact"></i>přesný tip</span><span><i class="l-dir"></i>správný výsledek (výhra/remíza/prohra)</span><span><i class="l-miss"></i>vedle</span></div>';

  rd.matches.forEach(m => {
    const res = parseScore(m.result);
    const resOut = outcome(res);
    html += `<div class="match-card"><div class="match-head"><span class="fixture">${m.fixture}</span><span class="result ${res?'':'pending'}">${m.result || 'neodehráno'}</span></div><div class="chips">`;
    data.teams.forEach(t => {
      const tips = t.cols.map(c => norm(m.tips[c]));
      const uniqueTip = tips[0] === tips[1] ? tips[0] : tips.join(' / ');
      let cls = 'pending';
      if(res && tips[0]){
        const t1 = parseScore(tips[0]);
        if(t1){
          if(tips[0]===m.result) cls='exact';
          else if(outcome(t1)===resOut) cls='direction';
          else cls='miss';
        }
      }
      html += `<div class="chip ${cls}"><span class="who">${shortName(t.names[0])}/${shortName(t.names[1])}</span><span>${uniqueTip || '–'}</span></div>`;
    });
    html += '</div></div>';
  });
  return html;
}

const PAGE_TITLES = { domu:'P100', jednotlivci:'P101', tymy:'P102', zapasy:'P103' };
let currentPage = 'domu';
let currentRound = null;

function renderPage(){
  const app = document.getElementById('app');
  const standings = computeStandings(DATA);
  document.getElementById('pageno').textContent = PAGE_TITLES[currentPage];
  if(currentPage==='domu') app.innerHTML = renderHome(DATA, standings);
  else if(currentPage==='jednotlivci') app.innerHTML = renderIndiv(standings);
  else if(currentPage==='tymy') app.innerHTML = renderTeams(standings);
  else if(currentPage==='zapasy'){
    if(!currentRound) currentRound = DATA.rounds[DATA.rounds.length-1]?.number || 1;
    app.innerHTML = renderMatches(DATA, currentRound);
    app.querySelectorAll('.round-picker button').forEach(b => {
      b.addEventListener('click', () => { currentRound = parseInt(b.dataset.round,10); renderPage(); });
    });
  }
}

document.querySelectorAll('.fx button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.fx button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    currentPage = b.dataset.p;
    renderPage();
  });
});

function setStatus(msg){ document.getElementById('updated').textContent = msg; }

async function loadData(silent){
  if(!silent) setStatus('Načítám data…');
  try{
    const resp = await fetch(CSV_URL + (CSV_URL.includes('?')?'&':'?') + '_ts=' + Date.now());
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    const parsed = Papa.parse(text, { skipEmptyLines:false });
    DATA = parseSheet(parsed.data);
    renderPage();
    const now = new Date();
    setStatus('Aktualizováno ' + now.toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}));
  }catch(err){
    console.error(err);
    document.getElementById('app').innerHTML = `<div class="state-msg">Data se nepodařilo načíst.<br>${err.message}<br><br>Zkontrolujte, že tabulka je stále publikovaná (Soubor → Sdílet → Publikovat na web), a odkaz v souboru index.html.<br><a href="${CSV_URL}" target="_blank" rel="noopener">Otevřít zdrojová data</a></div>`;
    setStatus('Chyba načtení dat');
  }
}

document.getElementById('refreshBtn').addEventListener('click', () => loadData(false));
loadData(false);
setInterval(() => loadData(true), AUTO_REFRESH_MS);
</script>
</body>
</html>
