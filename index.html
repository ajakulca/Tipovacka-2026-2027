<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipovačka — Ligová tipovací soutěž</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#f7f8fb; --card:#ffffff; --card2:#eef1f7;
    --ink:#171923; --dim:#6b7280;
    --gold:#f2c14e; --gold-deep:#c99a2e;
    --red:#e63946; --red-deep:#b81f2c;
    --blue:#1d6fe0; --blue-deep:#144fae;
    --green:#22c55e;
    --border:#e4e7ee;
    --radius:18px;
    --shadow:0 6px 20px rgba(23,25,35,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',sans-serif; color:var(--ink); background:var(--bg);
    min-height:100vh; -webkit-font-smoothing:antialiased; position:relative; overflow-x:hidden;
  }
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

  body::before{
    content:""; position:fixed; top:-120px; right:-120px; width:340px; height:340px;
    border:2px solid rgba(230,57,70,0.12); border-radius:50%; pointer-events:none; z-index:0;
  }
  body::after{
    content:""; position:fixed; bottom:-160px; left:-160px; width:380px; height:380px;
    border:2px solid rgba(29,111,224,0.12); border-radius:50%; pointer-events:none; z-index:0;
  }
  .ball-deco{ position:absolute; top:14px; right:18px; font-size:34px; opacity:0.5; }

  .wrap{max-width:640px;margin:0 auto;padding:0 16px 100px; position:relative; z-index:1;}

  header.hero{
    padding:26px 32px 18px; text-align:left; position:relative; overflow:hidden;
    background:linear-gradient(135deg,var(--red),var(--red-deep) 45%, var(--blue));
    margin:0 -16px 0; border-radius:0 0 28px 28px;
  }
  header.hero::before{
    content:""; position:absolute; inset:0;
    background:linear-gradient(120deg, rgba(255,255,255,0.18), transparent 55%, rgba(255,255,255,0.10));
  }
  header.hero .eyebrow{ position:relative; color:rgba(255,255,255,0.9); font-size:12px; font-weight:700; letter-spacing:1.8px; text-transform:uppercase; margin-bottom:6px; }
  header.hero h1{ position:relative; margin:0; font-size:27px; font-weight:700; color:#fff; }

  .statusbar{
    display:flex; align-items:center; justify-content:space-between;
    max-width:640px; margin:0 auto; padding:10px 32px 14px; font-size:12.5px; color:var(--dim);
  }
  .statusbar button{
    background:var(--card); border:1px solid var(--border); color:var(--red);
    font-family:'Inter',sans-serif; font-size:12.5px; font-weight:700;
    padding:6px 14px; border-radius:999px; cursor:pointer; box-shadow:var(--shadow);
  }
  .statusbar button:active{transform:scale(0.96);}
  .statusbar button:focus-visible, .tabs button:focus-visible, .rounds button:focus-visible{
    outline:2px solid var(--blue); outline-offset:2px;
  }

  .tabs{
    display:flex; gap:5px; max-width:640px; margin:0 auto; padding:6px 12px 14px;
    position:sticky; top:0; z-index:50;
    background:linear-gradient(180deg, var(--bg) 78%, transparent);
  }
  .tabs button{
    flex:1; border:1px solid var(--border); border-radius:999px; padding:9px 3px;
    font-family:'Inter',sans-serif; font-weight:700; font-size:11.5px;
    background:var(--card); color:var(--dim); cursor:pointer; box-shadow:var(--shadow);
    transition:background .15s, color .15s, transform .1s;
  }
  .tabs button.active{background:linear-gradient(135deg,var(--red),var(--red-deep)); color:#fff; border-color:transparent;}
  .tabs button:active{transform:scale(0.96);}

  main{padding-top:6px;}

  .section-title{ font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.8px; color:var(--blue); margin:26px 4px 12px; }
  .section-title:first-child{margin-top:6px;}

  .leader-banner{ display:flex; gap:10px; margin-bottom:6px; }
  .leader-card{
    flex:1; border-radius:var(--radius); padding:16px 14px; color:#fff;
    background:linear-gradient(135deg,#ff7a82,var(--red) 70%, var(--red-deep));
    box-shadow:var(--shadow); position:relative; overflow:hidden;
  }
  .leader-card.team{ background:linear-gradient(135deg,#5b9bff,var(--blue) 70%, var(--blue-deep)); }
  .leader-card .tag{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.6px; opacity:0.85; margin-bottom:4px; }
  .leader-card .who{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:16px; line-height:1.2; margin-bottom:4px; }
  .leader-card .pts{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:20px; }
  .leader-card .crown{ position:absolute; right:10px; top:8px; font-size:24px; opacity:0.9; }

  .podium{display:flex; align-items:flex-end; gap:10px; margin-bottom:6px; padding:0 2px;}
  .podium .slot{
    flex:1; border-radius:14px 14px 8px 8px; padding:16px 8px 14px;
    text-align:center; position:relative;
    display:flex; flex-direction:column; justify-content:flex-end;
    box-shadow:var(--shadow);
  }
  .podium .slot .trophy{ font-size:26px; margin-bottom:6px; }
  .podium .slot .medal{
    width:30px;height:30px;border-radius:50%;margin:0 auto 8px;
    display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px;
    box-shadow:inset 0 2px 3px rgba(255,255,255,0.4), 0 2px 6px rgba(0,0,0,0.3);
  }
  .podium .p1{ order:2; min-height:172px; background:linear-gradient(160deg,#3a2f10,#1e1a10); border:1px solid var(--gold); }
  .podium .p2{ order:1; min-height:140px; background:linear-gradient(160deg,#2a2a34,#1a1a22); border:1px solid #9aa2b1; }
  .podium .p3{ order:3; min-height:120px; background:linear-gradient(160deg,#3a2416,#1e150d); border:1px solid #c98a4e; }
  .podium .p1 .medal{ background:linear-gradient(160deg,#ffe9a8,var(--gold)); color:#3a2e00; }
  .podium .p2 .medal{ background:linear-gradient(160deg,#e4e9f0,#b9c2d0); color:#1f2430; }
  .podium .p3 .medal{ background:linear-gradient(160deg,#f0c090,#c98a4e); color:#3a2200; }
  .podium .nm{font-weight:700; font-size:13.5px; line-height:1.2; margin-bottom:4px; word-break:break-word; color:#fff;}
  .podium .pt{font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--gold); font-size:15px;}
  .podium .p2 .pt, .podium .p3 .pt{color:#fff;}

  .card{ background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; box-shadow:var(--shadow); }
  .card h3{margin:0 0 10px; font-size:13px; color:var(--dim); text-transform:uppercase; letter-spacing:0.5px; font-weight:700;}
  .row-line{display:flex; justify-content:space-between; align-items:center; padding:7px 0; border-bottom:1px dashed var(--border); font-size:14px;}
  .row-line:last-child{border-bottom:none;}
  .row-line .v{font-family:'Space Grotesk',sans-serif; color:var(--blue); font-weight:700;}
  .row-line .v.pending{color:var(--dim); font-weight:400; font-family:'Inter',sans-serif;}

  .rank-list{display:flex; flex-direction:column; gap:8px;}
  .rank-item{ display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:10px 14px; box-shadow:var(--shadow); }
  .rank-badge{ width:28px;height:28px;border-radius:50%; flex:none; display:flex;align-items:center;justify-content:center;
    font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:13px; background:var(--card2); color:var(--ink); }
  .rank-item:nth-child(1) .rank-badge{background:linear-gradient(160deg,#ffe9a8,var(--gold)); color:#3a2e00;}
  .rank-item:nth-child(2) .rank-badge{background:linear-gradient(160deg,#e4e9f0,#b9c2d0); color:#1f2430;}
  .rank-item:nth-child(3) .rank-badge{background:linear-gradient(160deg,#f0c090,#c98a4e); color:#3a2200;}
  .rank-name{flex:1; font-weight:600; font-size:14.5px;}
  .rank-pts{font-family:'Space Grotesk',sans-serif; font-weight:700; color:var(--blue); font-size:15px;}

  .rounds{display:flex; gap:6px; overflow-x:auto; padding-bottom:6px; margin-bottom:14px; -webkit-overflow-scrolling:touch;}
  .rounds button{ flex:none; border:1px solid var(--border); background:var(--card); color:var(--ink); font-weight:700; font-size:13px;
    padding:8px 14px; border-radius:999px; cursor:pointer; box-shadow:var(--shadow); }
  .rounds button.active{background:linear-gradient(135deg,var(--blue),var(--blue-deep)); color:#fff; border-color:transparent;}

  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:11.5px; color:var(--dim); margin-bottom:12px;}
  .legend span{display:inline-flex; align-items:center; gap:5px;}
  .legend i{width:9px;height:9px;border-radius:50%; display:inline-block;}
  .l-exact{background:var(--red);} .l-dir{background:var(--green);} .l-miss{background:#9aa2b1;}

  .match-card{background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:13px 15px; margin-bottom:12px; box-shadow:var(--shadow);}
  .match-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .match-top .fixture{font-weight:700; font-size:14.5px;}
  .match-top .res{ font-family:'Space Grotesk',sans-serif; font-weight:700; font-size:14px;
    background:var(--card2); padding:3px 10px; border-radius:999px; color:var(--blue); }
  .match-top .res.pending{color:var(--dim); font-weight:500; background:var(--card2);}
  .chips{display:flex; flex-wrap:wrap; gap:6px;}
  .chip{ font-size:12px; font-weight:700; padding:5px 9px; border-radius:999px; display:flex; gap:6px; align-items:center; }
  .chip .who{opacity:0.7; font-weight:600;}
  .chip.exact{background:rgba(230,57,70,0.14); color:#c11f2b;}
  .chip.direction{background:rgba(34,197,94,0.14); color:#16874a;}
  .chip.miss{background:var(--card2); color:#6b7280;}
  .chip.pending{background:var(--card2); color:#9aa2b1;}

  .state-msg{padding:60px 16px; text-align:center; color:var(--dim); font-size:14px;}
  .state-msg a{color:var(--blue);}
  .blink{animation:blink 1.1s steps(1) infinite;}
  @keyframes blink{50%{opacity:0;}}

  .note{font-size:12px; color:var(--dim); margin:-4px 4px 14px;}

  .fadein{animation:fadein .35s ease both;}
  @keyframes fadein{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);}}

  .grid-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border); border-radius:var(--radius); margin-bottom:16px; box-shadow:var(--shadow);}
  .grid-scroll table{border-collapse:collapse;width:100%;min-width:640px;}
  .grid-scroll th,.grid-scroll td{padding:7px 8px;text-align:center;font-size:12px;white-space:nowrap;}
  .grid-scroll thead th{background:var(--card2);color:var(--blue);font-family:'Space Grotesk',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:0.4px;position:sticky;top:0;}
  .grid-scroll tbody tr{background:var(--card);}
  .grid-scroll tbody tr:nth-child(even){background:var(--card2);}
  .grid-scroll td.pos{font-weight:700;color:var(--ink);background:var(--card2);position:sticky;left:0;}
  .grid-scroll td.hit{color:#16874a;font-weight:700;}
  .grid-scroll td.miss-cell{color:#9aa2b1;}
  .card.hit-card{border-color:var(--green); border-width:1.5px;}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <span class="ball-deco">⚽</span>
    <div class="eyebrow">Sezóna 2026/2027</div>
    <h1>Tipovačka Liga</h1>
  </header>
  <div class="statusbar">
    <span id="updated">Načítám data…</span>
    <button id="refreshBtn">Obnovit</button>
  </div>
  <nav class="tabs">
    <button data-p="domu" class="active">Domů</button>
    <button data-p="jednotlivci">Jednotlivci</button>
    <button data-p="tymy">Týmy</button>
    <button data-p="zapasy">Zápasy</button>
    <button data-p="tabulka">Tabulka</button>
  </nav>
  <main id="app">
    <div class="state-msg">Načítám data<span class="blink">…</span></div>
  </main>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRg_TzppNqjN3N9bfhMZ1mbVAqNqvHod2_h37lXPr2e7HJsU-aKrUtzvsKqbOO0EFniJJdz6os6HCxV/pub?output=csv";
const CSV_URL_TABULKA = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRg_TzppNqjN3N9bfhMZ1mbVAqNqvHod2_h37lXPr2e7HJsU-aKrUtzvsKqbOO0EFniJJdz6os6HCxV/pub?gid=918467477&single=true&output=csv";
const AUTO_REFRESH_MS = 5 * 60 * 1000;

const STAT_LABELS = {
  celkemJedn: "Celkem jednotlivci",
  tymVKole: "Tým v tomto kole",
  celkemTym: "Celkem tým",
  poradiTym: "Pořadí týmů",
  b102: "Body 1,0,2",
  bpresne: "Body přesné výsledky",
  bbonus: "Body bonus"
};

let DATA = null;
let TAB = null;

function norm(s){ return (s || "").toString().trim(); }
function parseScore(s){ s=norm(s); const m=s.match(/^(\d+)\s*:\s*(\d+)$/); return m ? [parseInt(m[1],10),parseInt(m[2],10)] : null; }
function outcome(pair){ if(!pair) return null; const d=pair[0]-pair[1]; return d>0?1:(d<0?-1:0); }
function shortName(n){ return n.length>4 ? n.slice(0,4) : n; }

/* ---------- TIPOVAJDA sheet parsing ---------- */
function parseSheet(rows){
  let headerIdx=-1;
  for(let r=0;r<rows.length;r++){ if(rows[r].some(c=>norm(c)==="Zápas")){ headerIdx=r; break; } }
  if(headerIdx<1) throw new Error("Nenašel jsem hlavičku 'Zápas' v datech.");
  const headerRow=rows[headerIdx], namesRow=rows[headerIdx-1];
  const labelCol=headerRow.findIndex(c=>norm(c)==="Zápas");
  let resultCol=-1;
  for(let i=headerRow.length-1;i>=0;i--){ if(norm(headerRow[i])==="Zápas"){ resultCol=i; break; } }
  const playerCols=[];
  for(let i=labelCol+1;i<resultCol;i++){ if(norm(headerRow[i]).toUpperCase()==="TIP") playerCols.push(i); }
  if(playerCols.length===0||resultCol<0) throw new Error("Nepodařilo se rozpoznat sloupce s tipy.");

  const teams=[];
  for(let i=0;i<playerCols.length;i+=2){
    const c1=playerCols[i], c2=playerCols[i+1];
    const n1=norm(namesRow[c1])||`Hráč ${c1}`, n2=norm(namesRow[c2])||`Hráč ${c2}`;
    teams.push({id:teams.length, cols:[c1,c2], names:[n1,n2], label:`${n1} & ${n2}`});
  }
  const players=playerCols.map(c=>({col:c, name:norm(namesRow[c])||`Hráč ${c}`}));

  const rounds=[]; let cur=null;
  function ensureRound(){ if(!cur) cur={number:rounds.length+1, matches:[], stats:{}}; return cur; }
  function getCell(row,col){ return norm(row[col]); }
  function pairVal(row,c1,c2){ const a=getCell(row,c1), b=getCell(row,c2); return a!==""?a:b; }

  for(let r=headerIdx+1;r<rows.length;r++){
    const row=rows[r]; if(!row||row.length===0) continue;
    const label=getCell(row,labelCol);
    if(label==="") continue;
    if(label==="Zápas") continue;
    if(label.includes(" - ")){
      const rd=ensureRound(); const tips={};
      playerCols.forEach(c=>tips[c]=getCell(row,c));
      rd.matches.push({fixture:label, tips, result:getCell(row,resultCol)});
      continue;
    }
    const known=Object.values(STAT_LABELS).find(v=>v===label);
    if(known){
      const rd=ensureRound();
      const perPlayer={}; playerCols.forEach(c=>perPlayer[c]=getCell(row,c));
      const perTeam={}; teams.forEach(t=>perTeam[t.id]=pairVal(row,t.cols[0],t.cols[1]));
      rd.stats[label]={perPlayer,perTeam};
      if(label===STAT_LABELS.poradiTym){ rounds.push(rd); cur=null; }
    }
  }
  if(cur && cur.matches.length) rounds.push(cur);
  return {players, teams, rounds};
}

function computeStandings(data){
  const {players, teams, rounds}=data;
  const indivTotals={}; players.forEach(p=>indivTotals[p.col]=0);
  const teamTotals={}; teams.forEach(t=>teamTotals[t.id]=0);
  rounds.forEach(rd=>{
    const ij=rd.stats[STAT_LABELS.celkemJedn];
    if(ij) players.forEach(p=>{ indivTotals[p.col]+=parseInt(ij.perPlayer[p.col]||"0",10)||0; });
    const tk=rd.stats[STAT_LABELS.tymVKole];
    if(tk) teams.forEach(t=>{ teamTotals[t.id]+=parseInt(tk.perTeam[t.id]||"0",10)||0; });
  });
  const indivRanked=players.map(p=>({name:p.name, pts:indivTotals[p.col]})).sort((a,b)=>b.pts-a.pts);
  let rank=1; indivRanked.forEach((r,i)=>{ if(i>0 && r.pts<indivRanked[i-1].pts) rank=i+1; r.rank=rank; });
  const teamRanked=teams.map(t=>({label:t.label, pts:teamTotals[t.id]})).sort((a,b)=>b.pts-a.pts);
  rank=1; teamRanked.forEach((r,i)=>{ if(i>0 && r.pts<teamRanked[i-1].pts) rank=i+1; r.rank=rank; });
  return {indivRanked, teamRanked};
}

/* ---------- TABULKA sheet parsing ---------- */
function parseTabulka(rows){
  const blocks=[];
  let r=0;
  while(r<rows.length){
    const row=rows[r];
    if(!row){ r++; continue; }
    if(norm(row[0])==="Pořadí"){
      const headerRow=row;
      let realitaIdx=-1;
      for(let i=1;i<headerRow.length;i++){ if(norm(headerRow[i])==="REALITA"){ realitaIdx=i; break; } }
      if(realitaIdx<2){ r++; continue; }
      const playerCols=[]; for(let i=1;i<realitaIdx;i++) playerCols.push(i);
      const teams=[];
      for(let i=0;i<playerCols.length;i+=2){
        const c1=playerCols[i], c2=playerCols[i+1];
        if(c2===undefined) break;
        const n1=norm(headerRow[c1])||`H${c1}`, n2=norm(headerRow[c2])||`H${c2}`;
        teams.push({cols:[c1,c2], names:[n1,n2]});
      }
      r++;
      const positionRows=[];
      while(r<rows.length && /^\d+$/.test(norm(rows[r][0]))){
        const pr=rows[r]; const tips={};
        playerCols.forEach(c=>tips[c]=norm(pr[c]));
        positionRows.push({position:parseInt(norm(pr[0]),10), tips, realita:norm(pr[realitaIdx])});
        r++;
      }
      let cupWinner=null;
      if(r<rows.length && norm(rows[r][0])==="Vítěz poháru"){
        const cw=rows[r]; const tips={};
        playerCols.forEach(c=>tips[c]=norm(cw[c]));
        cupWinner={tips, realita:norm(cw[realitaIdx])};
        r++;
      }
      while(r<rows.length && rows[r].some(c=>norm(c)!=="") && norm(rows[r][0])!=="Pořadí"){ r++; }
      blocks.push({teams, positionRows, cupWinner});
      continue;
    }
    r++;
  }
  return {blocks};
}

/* ---------- Rendering ---------- */
function podiumHtml(top3){
  const order=[top3[1],top3[0],top3[2]];
  const cls=['p2','p1','p3'];
  const trophies=['🥈','🥇','🥉'];
  let html='<div class="podium">';
  order.forEach((item,idx)=>{
    if(!item){ html+=`<div class="slot ${cls[idx]}"></div>`; return; }
    html+=`<div class="slot ${cls[idx]}"><div class="trophy">${trophies[idx]}</div><div class="medal">${item.rank}</div><div class="nm">${item.name||item.label}</div><div class="pt">${item.pts} b.</div></div>`;
  });
  html+='</div>';
  return html;
}

function renderHome(data, standings){
  const nextRound=data.rounds.find(rd=>rd.matches.some(m=>m.result===""));
  const leadIndiv=standings.indivRanked[0];
  const leadTeam=standings.teamRanked[0];
  let html='<div class="leader-banner">';
  html+=`<div class="leader-card"><span class="crown">🏆</span><div class="tag">Vede — jednotlivci</div><div class="who">${leadIndiv.name}</div><div class="pts">${leadIndiv.pts} b.</div></div>`;
  html+=`<div class="leader-card team"><span class="crown">🏆</span><div class="tag">Vede — týmy</div><div class="who">${leadTeam.label}</div><div class="pts">${leadTeam.pts} b.</div></div>`;
  html+='</div>';

  html+='<div class="section-title">Top 3 — Jednotlivci</div>';
  html+=podiumHtml(standings.indivRanked.slice(0,3));
  html+='<div class="section-title">Top 3 — Týmy</div>';
  html+=podiumHtml(standings.teamRanked.slice(0,3).map(t=>({rank:t.rank, name:t.label, pts:t.pts})));
  if(nextRound){
    html+=`<div class="section-title">Nejbližší nerozehrané kolo — Kolo ${nextRound.number}</div><div class="card">`;
    nextRound.matches.forEach(m=>{
      html+=`<div class="row-line"><span>${m.fixture}</span><span class="v pending">${m.result||'–'}</span></div>`;
    });
    html+='</div>';
  }
  return html;
}

function renderIndiv(standings){
  let html='<div class="section-title">Pořadí jednotlivců</div><div class="rank-list">';
  standings.indivRanked.forEach(p=>{
    html+=`<div class="rank-item"><div class="rank-badge">${p.rank}</div><div class="rank-name">${p.name}</div><div class="rank-pts">${p.pts} b.</div></div>`;
  });
  html+='</div>';
  return html;
}

function renderTeams(standings){
  let html='<div class="section-title">Pořadí týmů</div><div class="rank-list">';
  standings.teamRanked.forEach(t=>{
    html+=`<div class="rank-item"><div class="rank-badge">${t.rank}</div><div class="rank-name">${t.label}</div><div class="rank-pts">${t.pts} b.</div></div>`;
  });
  html+='</div>';
  return html;
}

function renderMatches(data, roundNumber){
  const rounds=data.rounds;
  const rd=rounds.find(r=>r.number===roundNumber)||rounds[0];
  let html='<div class="section-title">Zápasy a tipy</div>';
  html+='<div class="rounds">';
  rounds.forEach(r=>{ html+=`<button data-round="${r.number}" class="${r.number===rd.number?'active':''}">Kolo ${r.number}</button>`; });
  html+='</div>';
  html+='<div class="legend"><span><i class="l-exact"></i>přesný tip</span><span><i class="l-dir"></i>zásah 1-0-2</span><span><i class="l-miss"></i>nesprávně</span></div>';

  rd.matches.forEach(m=>{
    const res=parseScore(m.result), resOut=outcome(res);
    html+=`<div class="match-card"><div class="match-top"><span class="fixture">${m.fixture}</span><span class="res ${res?'':'pending'}">${m.result||'neodehráno'}</span></div><div class="chips">`;
    data.teams.forEach(t=>{
      t.cols.forEach((c,idx)=>{
        const tip=norm(m.tips[c]);
        let cls='pending';
        if(res && tip){
          const t1=parseScore(tip);
          if(t1){ if(tip===m.result) cls='exact'; else if(outcome(t1)===resOut) cls='direction'; else cls='miss'; }
        }
        html+=`<div class="chip ${cls}"><span class="who">${shortName(t.names[idx])}</span><span>${tip||'–'}</span></div>`;
      });
    });
    html+='</div></div>';
  });
  return html;
}

function renderCupWinnerGrouped(block){
  if(!block.cupWinner) return '';
  const cw=block.cupWinner;
  const groups={};
  block.teams.forEach(t=>{
    t.cols.forEach((c,idx)=>{
      const tip=cw.tips[c];
      if(!tip) return;
      const key=tip.toLowerCase();
      if(!groups[key]) groups[key]={display:tip, people:[]};
      groups[key].people.push(t.names[idx]);
    });
  });
  const sorted=Object.values(groups).sort((a,b)=>b.people.length-a.people.length);
  let html='<div class="section-title">🏆 Tipy na vítěze poháru</div>';
  if(cw.realita) html+=`<div class="note">Skutečný vítěz: <strong>${cw.realita}</strong></div>`;
  sorted.forEach(g=>{
    const isRealita=cw.realita && g.display.toLowerCase()===cw.realita.toLowerCase();
    html+=`<div class="card${isRealita?' hit-card':''}"><div class="row-line" style="border:none;padding:0 0 6px;"><span style="font-weight:700;font-size:15px;">${g.display}</span><span class="v">${g.people.length}×</span></div><div style="color:var(--dim);font-size:13.5px;">${g.people.join(', ')}</div></div>`;
  });
  return html;
}

function renderTabulkaTable(block, title){
  let html=`<div class="section-title">${title}</div>`;
  html+='<div class="grid-scroll"><table><thead><tr><th>Místo</th>';
  block.teams.forEach(t=>{ t.names.forEach(n=>{ html+=`<th>${shortName(n)}</th>`; }); });
  html+='</tr></thead><tbody>';
  block.positionRows.forEach(pr=>{
    html+=`<tr><td class="pos">${pr.position}</td>`;
    block.teams.forEach(t=>{
      t.cols.forEach(c=>{
        const tip=pr.tips[c];
        let cls='';
        if(tip && pr.realita) cls = tip.toLowerCase()===pr.realita.toLowerCase() ? 'hit' : 'miss-cell';
        html+=`<td class="${cls}">${tip||'–'}</td>`;
      });
    });
    html+='</tr>';
  });
  html+='</tbody></table></div>';
  return html;
}

function renderTabulkaPage(){
  if(!TAB || !TAB.blocks || !TAB.blocks.length){
    return '<div class="state-msg">Data z Tabulky se nepodařilo načíst.</div>';
  }
  let html='';
  html+=renderCupWinnerGrouped(TAB.blocks[0]);
  html+=renderTabulkaTable(TAB.blocks[0], 'Tipy na konečnou tabulku');
  if(TAB.blocks[1]){
    html+=renderTabulkaTable(TAB.blocks[1], 'Tipy na pořadí dvojic po 30. kole');
    html+='<div class="note">Zatím vyplněno jen částečně — jak doplníte tipy do tabulky, objeví se tu samy.</div>';
  }
  return html;
}

/* ---------- Page control ---------- */
let currentPage='domu', currentRound=null;

function renderPage(){
  const app=document.getElementById('app');
  let html='';
  if(currentPage==='domu'){ const s=computeStandings(DATA); html=renderHome(DATA,s); }
  else if(currentPage==='jednotlivci'){ const s=computeStandings(DATA); html=renderIndiv(s); }
  else if(currentPage==='tymy'){ const s=computeStandings(DATA); html=renderTeams(s); }
  else if(currentPage==='zapasy'){
    if(!currentRound) currentRound=DATA.rounds[DATA.rounds.length-1]?.number||1;
    html=renderMatches(DATA,currentRound);
  } else if(currentPage==='tabulka'){
    html=renderTabulkaPage();
  }
  app.innerHTML=`<div class="fadein">${html}</div>`;
  if(currentPage==='zapasy'){
    app.querySelectorAll('.rounds button').forEach(b=>{
      b.addEventListener('click', ()=>{ currentRound=parseInt(b.dataset.round,10); renderPage(); });
    });
  }
}

document.querySelectorAll('.tabs button').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    currentPage=b.dataset.p;
    renderPage();
  });
});

function setStatus(msg){ document.getElementById('updated').textContent=msg; }

async function fetchCsv(url){
  const resp=await fetch(url+(url.includes('?')?'&':'?')+'_ts='+Date.now());
  if(!resp.ok) throw new Error('HTTP '+resp.status);
  const text=await resp.text();
  return Papa.parse(text,{skipEmptyLines:false}).data;
}

async function loadData(silent){
  if(!silent) setStatus('Načítám data…');
  try{
    const rows=await fetchCsv(CSV_URL);
    DATA=parseSheet(rows);
    try{
      const rows2=await fetchCsv(CSV_URL_TABULKA);
      TAB=parseTabulka(rows2);
    }catch(e2){
      console.error('Tabulka fetch/parse failed', e2);
      TAB=null;
    }
    renderPage();
    setStatus('Aktualizováno '+new Date().toLocaleTimeString('cs-CZ',{hour:'2-digit',minute:'2-digit'}));
  }catch(err){
    console.error(err);
    document.getElementById('app').innerHTML=`<div class="state-msg">Data se nepodařilo načíst.<br>${err.message}<br><br>Zkontrolujte publikaci tabulky a odkaz v souboru.<br><a href="${CSV_URL}" target="_blank" rel="noopener">Otevřít zdrojová data</a></div>`;
    setStatus('Chyba načtení dat');
  }
}

document.getElementById('refreshBtn').addEventListener('click', ()=>loadData(false));
loadData(false);
setInterval(()=>loadData(true), AUTO_REFRESH_MS);
</script>
